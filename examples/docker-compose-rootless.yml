x-container-hardening: &container-hardening
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
    - /run:rw,noexec,nosuid,size=16m
    - /home/django:rw,noexec,nosuid,size=16m
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  management:
    image: ghcr.io/271u/train-conductors:v0.0.1-alpha3
    restart: unless-stopped
    env_file:
      - .env
    <<: *container-hardening
    volumes:
      - ./data:/app/data:rw
    networks:
      - internal
      - traefik-public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5).read()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.trains-preprod.rule=Host(`trains.2271-united.org`)
      - traefik.http.routers.trains-preprod.entrypoints=https
      - traefik.http.routers.trains-preprod.tls=true
      - traefik.http.routers.trains-preprod.tls.certresolver=letsencrypt
      - traefik.http.services.trains-preprod.loadbalancer.server.port=8000


  player-sync:
    image: ghcr.io/271u/train-conductors:v0.0.1-alpha3
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "/app/scripts/player_sync.sh"]
    <<: *container-hardening
    volumes:
      - ./data:/app/data:rw
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      management:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    env_file:
      - .env
    #ports:
    #  - 127.0.0.1:5432:5432
    volumes:
      - ./db-data:/var/lib/postgresql/
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
     


networks:
  internal:
  traefik-public:
    external: true
