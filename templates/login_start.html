{% extends "base.html" %}

{% block title %}Login | {{ app_name }}{% endblock %}

{% block content %}
<div class="login-start-page">
  <div class="login-start-card box has-text-centered">
    <div class="login-start-icon" aria-hidden="true">
      <i class="fa-solid fa-train-subway"></i>
    </div>

    <p class="login-start-kicker has-text-weight-semibold mb-2">
      All aboard!
    </p>

    <h1 class="title is-2 mb-3">
      {{ app_name }}
    </h1>

    <p class="subtitle is-5 mb-5">
      Sign in to manage rotations, players, and conductor notes.
    </p>

    <form id="oidc-login-form" method="post" action="{{ oidc_login_url }}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next_url }}">

      <button class="button is-primary is-medium login-start-button" type="submit">
        <span class="icon">
          <i class="fa-solid fa-right-to-bracket"></i>
        </span>
        <span>Continue to login</span>
      </button>
    </form>

    <p class="help mt-4">
      Your next stop will open automatically after login.
    </p>
  </div>
</div>
{% endblock %}
