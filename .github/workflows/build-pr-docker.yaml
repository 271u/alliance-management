name: Build PR Docker image

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  build-pr-image:
    runs-on: ubuntu-latest

    if: github.event.pull_request.draft == false

    permissions:
      contents: read
      packages: write

    concurrency:
      group: docker-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=pr-${{ github.event.pull_request.number }}-

      - name: Prepare app version
        id: app-version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "version=pr-${{ github.event.pull_request.number }}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.app-version.outputs.version }}
            APP_SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
